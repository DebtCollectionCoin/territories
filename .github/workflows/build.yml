name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Engine tests ───────────────────────────────────────────────────────────
  test-engine:
    name: Engine unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle

      - name: Run engine tests (JVM)
        run: ./gradlew :engine:jvmTest --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: engine-test-results
          path: engine/build/reports/tests/

  # ── Web build ──────────────────────────────────────────────────────────────
  build-web:
    name: Web app (Kotlin/JS)
    runs-on: ubuntu-latest
    needs: test-engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle

      - name: Build web production distribution
        run: ./gradlew :app-web:jsBrowserProductionWebpack --no-daemon

      - name: Upload web artifacts
        uses: actions/upload-artifact@v4
        with:
          name: territories-web
          path: app-web/build/dist/js/productionExecutable/

  # ── Desktop Linux build ────────────────────────────────────────────────────
  build-desktop-linux:
    name: Desktop — Linux .deb
    runs-on: ubuntu-latest
    needs: test-engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle

      - name: Package .deb
        run: ./gradlew :app-desktop:packageDeb --no-daemon

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: territories-linux-deb
          path: app-desktop/build/compose/binaries/main/deb/*.deb

  # ── Desktop Windows build ──────────────────────────────────────────────────
  build-desktop-windows:
    name: Desktop — Windows .msi
    runs-on: windows-latest
    needs: test-engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle

      - name: Package .msi
        run: ./gradlew :app-desktop:packageMsi --no-daemon

      - name: Upload .msi artifact
        uses: actions/upload-artifact@v4
        with:
          name: territories-windows-msi
          path: app-desktop/build/compose/binaries/main/msi/*.msi

  # ── Android build ──────────────────────────────────────────────────────────
  build-android:
    name: Android APK (debug)
    runs-on: ubuntu-latest
    needs: test-engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK
        run: ./gradlew :app-android:assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: territories-android-debug
          path: app-android/build/outputs/apk/debug/*.apk

  # ── Release artifacts (on tag push only) ─────────────────────────────────
  release:
    name: Publish release artifacts
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [ build-web, build-desktop-linux, build-desktop-windows, build-android ]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/territories-linux-deb/*.deb
            dist/territories-windows-msi/*.msi
            dist/territories-android-debug/*.apk
          generate_release_notes: true
